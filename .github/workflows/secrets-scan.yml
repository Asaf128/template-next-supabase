name: Secret Scan

on:
  pull_request:
    branches:
      - main

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Kompletten Verlauf scannen statt nur den Push-Range
          # Verhindert den "ambiguous argument" Fehler beim ersten Commit
          GITLEAKS_LOG_OPTS: --all
