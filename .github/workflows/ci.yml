name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  checks:
    name: Lint, Types, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install

      - name: Prettier
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint --max-warnings=0

      - name: TypeScript
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          # Fallback-Werte damit der Template-Build nicht scheitert
          # In echten Projekten: Repo → Settings → Secrets → Actions
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}

      - name: Security audit
        run: pnpm audit --audit-level=high
